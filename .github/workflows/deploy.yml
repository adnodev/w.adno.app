name: Deploy ADNO Production

on:
  repository_dispatch:
    types: [new_release]
  workflow_dispatch:
    inputs:
      version:
        description: "Version à déployer (ex: 1.4.2)"
        required: true
        type: string

jobs:
  deploy:
    name: deploy_prod
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ github.event.client_payload.version }}"
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Aucune version fournie"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.ADNO_BOT_APP_ID }}
          private-key: ${{ secrets.ADNO_BOT_PRIVATE_KEY }}
          repositories: adno
          owner: adnodev

      - name: Download release asset
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          gh release download "v${VERSION}" \
            --repo adnodev/adno \
            --pattern "adno.${VERSION}.zip" \
            --output adno.zip
          unzip adno.zip

      - name: Add CNAME
        run: echo "adno.app" > dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
